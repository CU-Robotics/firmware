[platformio]
description = Teensy 4.1 on-target unit tests

[env:teensy41_test_sensors]
platform = teensy
board = teensy41
framework = arduino
upload_protocol = teensy-cli
test_framework = unity
test_filter = test_sensors
test_speed = 115200
test_build_src = yes
lib_ldf_mode = chain
build_unflags = -std=gnu++14 -std=c++14 -std=gnu++17 -std=c++17
build_flags =
  -Isrc
  -Isrc/utils
  -Isrc/comms
  -Isrc/sensors
  -std=gnu++20
  -DUSB_SERIAL
lib_deps =
  adafruit/Adafruit ICM20X
  ssilverman/QNEthernet
  Wire
  SPI
build_src_filter =
  -<*>
  +<sensors/buff_encoder.cpp>
  +<sensors/ICM20649.cpp>
  +<sensors/StereoCamTrigger.cpp>
  +<comms/comms_layer.cpp>
  +<comms/ethernet_comms.cpp>
  +<comms/hid_comms.cpp>
  +<comms/data/>
  +<comms/config_data/>

